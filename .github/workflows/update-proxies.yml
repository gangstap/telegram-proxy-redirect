name: Fetch Telegram Proxies

on:
  schedule:
    - cron: '*/30 * * * *'  # 🔁 Каждые 30 минут (экономия лимитов)
  workflow_dispatch:        # 🎯 Ручной запуск

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true  # 🗑️ Отменяем старые запуски

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4  # ✅ Стабильная версия
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Fetch proxies
        run: node fetch-proxies.js
      
      - name: Commit and push ONLY if content changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add proxies.json
          
          # 🔍 Проверяем, изменилось ли СОДЕРЖИМОЕ (не просто время)
          if ! git diff --staged --quiet -- proxies.json; then
            echo "✅ Changes detected in proxies.json"
            git commit -m "chore(proxies): auto-update $(date +'%Y-%m-%d %H:%M') [skip ci]"
            git push
          else
            echo "ℹ️ No meaningful changes — skipping commit"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
