<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MTProto Proxy Hub v2.0.8</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0b1120; color: #e2e8f0;
            min-height: 100vh; display: flex; justify-content: center; align-items: flex-start;
            padding: 24px 12px;
        }
        .container {
            max-width: 680px; width: 100%; margin: 0 auto;
            background: rgba(15,23,42,0.95); backdrop-filter: blur(12px);
            border-radius: 24px; padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.45); border: 1px solid #1e293b;
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 12px; border-bottom: 1px solid #1e293b; margin-bottom: 16px; flex-wrap: wrap; gap: 8px;
        }
        .version { font-size: 0.8rem; font-weight: 500; color: #94a3b8; }
        .stats { font-size: 0.75rem; color: #64748b; display: flex; gap: 8px; align-items: center; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #64748b; }
        .status-dot.online { background: #22c55e; box-shadow: 0 0 8px #22c55e60; }
        .status-dot.offline { background: #ef4444; }
        h1 { font-size: 1.5rem; font-weight: 600; text-align: center; margin: 8px 0 6px; }
        .sub { text-align: center; font-size: 0.85rem; color: #64748b; margin-bottom: 16px; }
        
        .proxy-card {
            background: #111827; border-radius: 16px; padding: 12px 14px;
            margin-bottom: 10px; display: grid; grid-template-columns: auto 1fr auto;
            gap: 12px; align-items: center; position: relative;
            border: 2px solid transparent; transition: all 0.25s ease; overflow: hidden;
        }
        .proxy-card.active {
            border-color: #facc15;
            box-shadow: 0 0 16px rgba(250,204,21,0.25), inset 0 0 24px rgba(250,204,21,0.05);
            animation: goldGlow 2.5s infinite alternate ease-in-out;
        }
        @keyframes goldGlow {
            0% { box-shadow: 0 0 16px rgba(250,204,21,0.2), inset 0 0 24px rgba(250,204,21,0.03); }
            100% { box-shadow: 0 0 24px rgba(250,204,21,0.4), inset 0 0 36px rgba(250,204,21,0.08); }
        }
        .proxy-card.active::before {
            content: ''; position: absolute; top: 0; left: -50%; width: 200%; height: 2px;
            background: linear-gradient(90deg, transparent, #facc15, transparent);
            animation: shimmer 3s infinite linear;
        }
        @keyframes shimmer { 0% { transform: translateX(-50%); } 100% { transform: translateX(50%); } }
        
        .proxy-card.used { 
            filter: grayscale(0.85); opacity: 0.75; border-color: #475569; animation: none !important; 
        }
        .proxy-card.used::after {
            content: '✓'; position: absolute; top: 6px; right: 10px;
            color: #22c55e; font-weight: bold; font-size: 0.9rem; text-shadow: 0 0 4px rgba(0,0,0,0.5);
        }
        .proxy-card.used .btn { 
            background: linear-gradient(135deg, #475569, #334155); 
            box-shadow: none; opacity: 0.9; cursor: pointer; pointer-events: auto !important; 
        }
        .proxy-card.used .btn:hover { filter: brightness(1.05); transform: none; }
        
        .flag { font-size: 1.8rem; line-height: 1; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4)); }
        .info { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
        .host { font-weight: 500; color: #f1f5f9; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .meta { display: flex; gap: 8px; align-items: center; font-size: 0.75rem; color: #94a3b8; flex-wrap: wrap; }
        .type-badge { background: #3b82f620; color: #60a5fa; padding: 2px 6px; border-radius: 4px; font-weight: 500; font-size: 0.65rem; text-transform: uppercase; }
        .ping-badge { padding: 2px 6px; border-radius: 4px; font-weight: 500; min-width: 42px; text-align: center; }
        .ping-good { background: #22c55e20; color: #4ade80; }
        .ping-mid { background: #eab30820; color: #facc15; }
        .ping-bad { background: #ef444420; color: #f87171; }
        
        .btn {
            background: linear-gradient(135deg, #0ea5e9, #0284c7); color: #fff;
            border: none; padding: 8px 16px; border-radius: 10px; font-weight: 500;
            cursor: pointer; font-size: 0.85rem; transition: all 0.15s;
            box-shadow: 0 2px 8px rgba(14,165,233,0.25);
        }
        .btn:hover { transform: translateY(-1px); filter: brightness(1.1); }
        .btn:active { transform: translateY(0); }
        
        .footer {
            text-align: center; margin-top: 18px; font-size: 0.75rem; color: #64748b;
            display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap;
        }
        .refresh-btn {
            background: none; border: 1px solid #334155; color: #94a3b8;
            padding: 4px 10px; border-radius: 8px; cursor: pointer; font-size: 0.7rem; transition: 0.15s;
        }
        .refresh-btn:hover { border-color: #64748b; color: #e2e8f0; }
        
        .loader { text-align: center; padding: 40px 20px; color: #94a3b8; }
        .spinner {
            width: 28px; height: 28px; border: 3px solid #1e293b; border-top-color: #0ea5e9;
            border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error { background: #450a0a; border: 1px solid #7f1d1d; padding: 12px; border-radius: 12px; text-align: center; margin: 20px 0; color: #fca5a5; }
        .error small { display: block; margin-top: 6px; opacity: 0.7; }
        .notice { background: #1e293b; border-left: 3px solid #3b82f6; padding: 8px 12px; margin: 12px 0; border-radius: 6px; font-size: 0.75rem; color: #94a3b8; }
        .config-notice { background: #78350f40; border: 1px solid #facc1560; border-radius: 12px; padding: 10px; margin: 12px 0; font-size: 0.75rem; color: #facc15; text-align: center; }
        .source-tag { font-size: 0.65rem; opacity: 0.6; margin-left: auto; }

        @media (max-width: 520px) {
            .proxy-card { grid-template-columns: 1fr; gap: 8px; }
            .btn { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="loader">
        <div class="spinner"></div>
        <div>Загрузка прокси...</div>
    </div>
</div>

<script>
    // ⚙️ НАСТРОЙКИ — ВСТАВЬТЕ СЮДА URL ВАШЕГО CLOUDFLARE WORKER
    const WORKER_URL = "https://ВАШ-ВОРКЕР.workers.dev"; 
    
    const VERSION = "2.0.8";
    const REFRESH_MS = 3600000, PING_INTERVAL = 10000, CACHE_TTL = 1800000;
    const CACHE_KEY = `tgproxies_v${VERSION}`, USED_KEY = `tgproxies_used_v${VERSION}`;
    
    const FLAGS = { "US":"🇺🇸","DE":"🇩🇪","NL":"🇳🇱","FR":"🇫🇷","GB":"🇬🇧","FI":"🇫🇮","RU":"🇷🇺","UA":"🇺🇦","PL":"🇵🇱","SG":"🇸🇬","JP":"🇯🇵","IN":"🇮🇳","CA":"🇨🇦","AU":"🇦🇺","BR":"🇧🇷","TR":"🇹🇷","IR":"🇮🇷","AE":"🇦🇪","IL":"🇮🇱","SE":"🇸🇪","NO":"🇳🇴","CZ":"🇨🇿","LV":"🇱🇻","LT":"🇱🇹","EE":"🇪🇪","KZ":"🇰🇿","UZ":"🇺🇿","MD":"🇲🇩","BY":"🇧🇾","GE":"🇬🇪","AM":"🇦🇲","AZ":"🇦🇿","VN":"🇻🇳","TH":"🇹🇭","MY":"🇲🇾" };
    const DEFAULT_FLAG = "🌐";
    
    const text = { 
        title: "Прокси для Telegram", 
        sub: "Источник: @ProxyFree_Ru (архив 7 дней) • Автопроверка", 
        connect: "Подключить", 
        update: "Обновление через", 
        refresh: "🔄", 
        error: "Не удалось загрузить прокси", 
        notice: "Пинг проверяется каждые 10с. Для работы требуется клиент Telegram.",
        configError: "⚠️ Не настроен WORKER_URL — вставьте URL вашего воркера в код"
    };

    // 🔗 ИСТОЧНИКИ (Worker → API → GitHub → Fallback)
    const SOURCES = [
        { name: "MyWorker", url: WORKER_URL, type: "worker", priority: 1 },
        { name: "mtproto.space", url: "https://mtproto.space/api/proxies", type: "api", priority: 2, cors: true },
        { name: "SoliSpirit", url: "https://raw.githubusercontent.com/SoliSpirit/mtproto/master/all_proxies.txt", type: "txt", priority: 3, cors: true },
        { name: "Fallback", type: "fallback", priority: 99,  [
            { server: "185.173.36.38", port: "443", secret: "eeRighJJvXrFGRMCIMJdCQ", flag: "🇳🇱" },
            { server: "91.107.255.159", port: "8443", secret: "eeNEgYdJvXrFGRMCIMJdCQ", flag: "🇩🇪" },
            { server: "65.109.153.70", port: "8443", secret: "1320PuNyHw_LQKT_Y7XNJw", flag: "🇫🇮" },
            { server: "51.15.246.20", port: "8443", secret: "eeNEgYdJvXrFGRMCIMJdCQ", flag: "🇫🇷" }
        ]}
    ];

    // 🗄️ КЭШ
    function loadCache() { try { const d = JSON.parse(localStorage.getItem(CACHE_KEY)); if (d && Date.now() - d.time < CACHE_TTL) return d.proxies; } catch(e) {} return null; }
    function saveCache(p) { try { localStorage.setItem(CACHE_KEY, JSON.stringify({ proxies: p, time: Date.now() })); } catch(e) {} }
    function isUsed(p) { try { return JSON.parse(localStorage.getItem(USED_KEY) || "[]").includes(`${p.server}:${p.port}`); } catch(e) { return false; } }
    function markUsed(p) { try { const a = JSON.parse(localStorage.getItem(USED_KEY) || "[]"), k = `${p.server}:${p.port}`; if (!a.includes(k)) { a.push(k); localStorage.setItem(USED_KEY, JSON.stringify(a.slice(-50))); } } catch(e) {} }

    function parseTgLink(line) {
        let m = line.match(/tg:\/\/proxy\?server=([^&]+)&port=(\d+)&secret=([^&\s]+)/i);
        if (m) return { type: "MTProto", server: decodeURIComponent(m[1]), port: m[2], secret: decodeURIComponent(m[3]), raw: line };
        return null;
    }

    async function pingHost(server, port, timeout = 2500) {
        return new Promise(resolve => {
            const start = performance.now();
            const img = new Image(), t = setTimeout(() => { cleanup(); resolve(null); }, timeout);
            const cleanup = () => { clearTimeout(t); img.onload = img.onerror = null; img.src = ""; };
            img.onload = img.onerror = () => { cleanup(); const p = Math.round(performance.now() - start); resolve(p < timeout ? p : null); };
            img.src = `https://${server}:${port}/favicon.ico?t=${Date.now()}`;
        });
    }

    function getFlag(c) { return (c && FLAGS[c.toUpperCase()]) || DEFAULT_FLAG; }

    // 📥 ЗАГРУЗКА ПРОКСИ
    async function fetchProxies() {
        const cached = loadCache(); if (cached?.length) return { proxies: cached, fromCache: true };

        for (const src of SOURCES.sort((a,b) => a.priority - b.priority)) {
            try {
                console.log(`📡 ${src.name}...`);
                let proxies = [];

                if (src.type === "worker") {
                    if (!src.url || src.url.includes("ВАШ-ВОРКЕР")) {
                        console.warn("⚠️ WORKER_URL не настроен"); continue;
                    }
                    const r = await fetch(`${src.url}?pages=5&days=7`);
                    if (!r.ok) throw new Error(`Worker: ${r.status}`);
                    const json = await r.json();
                    if (!json.success) throw new Error(json.error || "Worker failed");
                    proxies = json.proxies.map(p => ({ ...p, source: "worker" }));
                }
                else if (src.type === "api") {
                    const r = await fetch(src.url); if (!r.ok) throw new Error(`HTTP ${r.status}`);
                    const json = await r.json();
                    const arr = Array.isArray(json) ? json : (json.proxies || json.items || []);
                    proxies = arr.filter(p => (p.status||"online").toLowerCase() !== "offline")
                        .map(p => parseTgLink(p.link || p.raw || `tg://proxy?server=${p.server||p.domain}&port=${p.port}&secret=${p.secret}`))
                        .filter(Boolean).map(p => ({ ...p, flag: getFlag(p.country || p.location) }));
                }
                else if (src.type === "txt") {
                    const r = await fetch(src.url); if (!r.ok) throw new Error(`HTTP ${r.status}`);
                    const txt = await r.text();
                    proxies = txt.split("\n").map(parseTgLink).filter(Boolean).slice(0, 25).map(p => ({ ...p, flag: DEFAULT_FLAG }));
                }
                else if (src.type === "fallback") {
                    proxies = (src.data || []).map(d => ({
                        type: "MTProto", ...d,
                        raw: `tg://proxy?server=${encodeURIComponent(d.server)}&port=${d.port}&secret=${encodeURIComponent(d.secret)}`,
                        source: "fallback", flag: d.flag || DEFAULT_FLAG
                    }));
                }

                if (proxies.length >= 2) {
                    const seen = new Set();
                    proxies = proxies.filter(p => { const k = `${p.server}:${p.port}`; if (seen.has(k)) return false; seen.add(k); return true; }).slice(0, 20);
                    console.log(`✅ ${proxies.length} прокси из ${src.name}`);
                    saveCache(proxies);
                    return { proxies, fromCache: false, source: src.name };
                }
            } catch(e) { console.warn(`❌ ${src.name}: ${e.message}`); }
        }
        return { proxies: [], fromCache: false };
    }

    function formatPing(ms) {
        if (!ms) return { text: "🔄", cls: "" };
        if (ms < 100) return { text: `${ms}ms`, cls: "ping-good" };
        if (ms < 250) return { text: `${ms}ms`, cls: "ping-mid" };
        return { text: `${ms}ms`, cls: "ping-bad" };
    }

    function render(proxies, sourceName) {
        let html = `
            <div class="header">
                <div class="version">v${VERSION}</div>
                <div class="stats">
                    <span class="status-dot ${proxies.length ? 'online' : 'offline'}"></span>
                    📡 ${proxies.length}
                </div>
            </div>
            <h1>${text.title}</h1>
            <div class="sub">${text.sub}</div>
            <div class="notice">${text.notice}</div>
        `;

        if (WORKER_URL.includes("ВАШ-ВОРКЕР")) {
            html += `<div class="config-notice">${text.configError}</div>`;
        }

        if (!proxies.length) {
            html += `<div class="error">${text.error}<br><small>Проверьте WORKER_URL или нажмите 🔄</small></div>`;
        } else {
            for (const p of proxies) {
                const used = isUsed(p);
                const pingInfo = formatPing(p.ping);
                html += `
                    <div class="proxy-card ${used ? 'used' : 'active'}" data-key="${p.server}:${p.port}">
                        <div class="flag">${p.flag}</div>
                        <div class="info">
                            <div class="host" title="${p.server}:${p.port}">${p.server}</div>
                            <div class="meta">
                                <span class="type-badge">${p.type}</span>
                                <span class="ping-badge ${pingInfo.cls}" id="ping-${p.server}-${p.port}">${pingInfo.text}</span>
                            </div>
                        </div>
                        <button class="btn" onclick="connectProxy('${p.raw}')">${text.connect}</button>
                        <span class="source-tag">${p.source || "API"}</span>
                    </div>
                `;
            }
        }

        const next = new Date(Date.now() + REFRESH_MS);
        html += `
            <div class="footer">
                ${text.update}: <span id="countdown">--:--</span>
                <button class="refresh-btn" onclick="location.reload()">${text.refresh}</button>
            </div>
        `;
        document.getElementById("app").innerHTML = html;
        
        if (proxies.length) { startPingLoop(proxies); startCountdown(next); }
    }

    async function startPingLoop(proxies) {
        const update = async () => {
            for (const p of proxies) {
                const el = document.getElementById(`ping-${p.server}-${p.port}`);
                if (!el || el.offsetParent === null) continue; // Пропускаем скрытые
                const ping = await pingHost(p.server, p.port);
                if (ping && el) {
                    const info = formatPing(ping);
                    el.textContent = info.text;
                    el.className = `ping-badge ${info.cls}`;
                }
            }
        };
        update();
        setInterval(update, PING_INTERVAL);
    }

    function formatCountdown(t) {
        const d = t - Date.now(); if (d <= 0) return "00:00";
        return `${Math.floor(d/60000).toString().padStart(2,'0')}:${Math.floor((d%60000)/1000).toString().padStart(2,'0')}`;
    }
    function startCountdown(t) {
        const el = document.getElementById("countdown"); if (!el) return;
        const i = setInterval(() => {
            if (el) el.textContent = formatCountdown(t);
            if (Date.now() >= t) { clearInterval(i); location.reload(); }
        }, 1000);
    }

    window.connectProxy = function(rawLink) {
        const match = rawLink.match(/server=([^&]+)&port=(\d+)/);
        if (match) {
            markUsed({ server: match[1], port: match[2] });
            const card = document.querySelector(`.proxy-card[data-key="${match[1]}:${match[2]}"]`);
            if (card) {
                card.classList.add("used");
                const btn = card.querySelector(".btn");
                if (btn) { const orig = btn.textContent; btn.textContent = "✓"; setTimeout(() => btn.textContent = orig, 600); }
            }
        }
        window.location.href = rawLink;
    };

    document.addEventListener("DOMContentLoaded", async () => {
        const { proxies, fromCache, source } = await fetchProxies();
        render(proxies, source || (fromCache ? "кэш" : ""));
    });
</script>
</body>
</html>
