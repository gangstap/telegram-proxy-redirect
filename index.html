<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTProto Proxy Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #0b1120; color: #e2e8f0; min-height: 100vh; display: flex; justify-content: center; padding: 24px 12px; }
        .container { max-width: 680px; width: 100%; background: rgba(15,23,42,0.95); backdrop-filter: blur(12px); border-radius: 24px; padding: 20px; border: 1px solid #1e293b; }
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 12px; border-bottom: 1px solid #1e293b; margin-bottom: 16px; }
        .version { font-size: 0.8rem; color: #64748b; }
        .stats { font-size: 0.75rem; color: #64748b; display: flex; align-items: center; gap: 6px; }
        h1 { font-size: 1.4rem; font-weight: 600; text-align: center; margin: 8px 0 4px; }
        .sub { text-align: center; font-size: 0.8rem; color: #64748b; margin-bottom: 16px; }
        
        .proxy-card { background: #111827; border-radius: 14px; padding: 10px 12px; margin-bottom: 8px; display: grid; grid-template-columns: auto 1fr auto; gap: 10px; align-items: center; border: 2px solid transparent; transition: 0.25s; position: relative; overflow: hidden; }
        .proxy-card.active { border-color: #facc15; box-shadow: 0 0 12px rgba(250,204,21,0.2); animation: glow 2.5s infinite alternate; }
        @keyframes glow { 0% { box-shadow: 0 0 12px rgba(250,204,21,0.2); } 100% { box-shadow: 0 0 20px rgba(250,204,21,0.35); } }
        .proxy-card.active::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, #facc15, transparent); animation: shimmer 3s infinite linear; }
        @keyframes shimmer { to { transform: translateX(200%); } }
        .proxy-card.used { filter: grayscale(0.85); opacity: 0.7; border-color: #334155; animation: none !important; }
        .proxy-card.used::after { content: '✓'; position: absolute; top: 6px; right: 10px; color: #22c55e; font-weight: bold; }
        
        .flag { font-size: 1.6rem; }
        .info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
        .host { font-weight: 500; color: #f1f5f9; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .meta { display: flex; gap: 6px; align-items: center; font-size: 0.7rem; color: #94a3b8; flex-wrap: wrap; }
        .type-badge { background: #3b82f620; color: #60a5fa; padding: 2px 5px; border-radius: 4px; font-weight: 500; }
        .ping-badge { padding: 2px 5px; border-radius: 4px; font-weight: 500; min-width: 40px; text-align: center; }
        .ping-good { background: #22c55e20; color: #4ade80; }
        .ping-mid { background: #eab30820; color: #facc15; }
        .ping-pending { background: #64748b20; color: #94a3b8; }
        .ping-na { background: #475569; color: #94a3b8; }
        
        .btn { background: linear-gradient(135deg, #0ea5e9, #0284c7); color: #fff; border: none; padding: 7px 14px; border-radius: 8px; font-weight: 500; cursor: pointer; font-size: 0.85rem; transition: 0.15s; }
        .btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .proxy-card.used .btn { background: #475569; box-shadow: none; opacity: 0.8; }
        
        .footer { text-align: center; margin-top: 14px; font-size: 0.75rem; color: #64748b; }
        .loader { text-align: center; padding: 30px; color: #94a3b8; }
        .spinner { width: 24px; height: 24px; border: 3px solid #1e293b; border-top-color: #0ea5e9; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-msg { background: #450a0a; border: 1px solid #7f1d1d; padding: 10px; border-radius: 10px; text-align: center; color: #fca5a5; font-size: 0.8rem; margin-bottom: 12px; }
        .fallback-badge { background: #78350f; color: #facc15; padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; }
        .debug-info { text-align: center; font-size: 0.7rem; color: #475569; margin: 8px 0; }
        
        .toast { position: fixed; top: 20px; right: 20px; z-index: 9999; background: linear-gradient(135deg, #10b981, #059669); color: #fff; padding: 12px 16px; border-radius: 12px; font-size: 0.85rem; font-weight: 500; box-shadow: 0 4px 12px rgba(16,185,129,0.4); transform: translateX(120%); opacity: 0; transition: 0.4s; display: flex; align-items: center; gap: 10px; }
        .toast.show { transform: translateX(0); opacity: 1; }
        .toast button { background: none; border: none; color: rgba(255,255,255,0.9); cursor: pointer; font-size: 1.1rem; padding: 0 4px; }
        @media (max-width: 500px) { .proxy-card { grid-template-columns: 1fr; } .btn { width: 100%; } .toast { left: 10px; right: 10px; justify-content: space-between; } }
    </style>
</head>
<body>
<div class="container" id="app"><div class="loader"><div class="spinner"></div>Загрузка...</div></div>

<script>
    // ⚠️⚠️⚠️ ВАЖНО: ВСТАВЬ СЮДА СВОЙ URL CLOUDFLARE WORKER ⚠️⚠️⚠️
    // Пример: "https://my-proxy-worker.myname.workers.dev"
    const WORKER_URL = "https://tg-proxy-fetcher.nevien19.workers.dev"; // ← ЗАМЕНИ ЭТО
    
    const CONFIG = {
        WORKER_URL: WORKER_URL + "/?pages=5&days=7",
        REFRESH_MS: 600000,
        PING_INTERVAL: 15000,
        MAX_PROXIES: 12,
        TIMER_KEY: "tg_tmr_v224",
        USED_KEY: "tg_used_v224",
        FALLBACK: [
            {type:"MTProto",server:"185.173.36.38",port:"443",secret:"eeRighJJvXrFGRMCIMJdCQ",flag:"🇳🇱",raw:"tg://proxy?server=185.173.36.38&port=443&secret=eeRighJJvXrFGRMCIMJdCQ"},
            {type:"MTProto",server:"91.107.255.159",port:"8443",secret:"eeNEgYdJvXrFGRMCIMJdCQ",flag:"🇩🇪",raw:"tg://proxy?server=91.107.255.159&port=8443&secret=eeNEgYdJvXrFGRMCIMJdCQ"},
            {type:"MTProto",server:"65.109.153.70",port:"8443",secret:"1320PuNyHw_LQKT_Y7XNJw",flag:"🇫🇮",raw:"tg://proxy?server=65.109.153.70&port=8443&secret=1320PuNyHw_LQKT_Y7XNJw"},
            {type:"MTProto",server:"51.15.246.20",port:"8443",secret:"eeNEgYdJvXrFGRMCIMJdCQ",flag:"🇫🇷",raw:"tg://proxy?server=51.15.246.20&port=8443&secret=eeNEgYdJvXrFGRMCIMJdCQ"},
            {type:"MTProto",server:"149.154.167.91",port:"8443",secret:"dd070b1b71f82167e279061e9b53f4f1",flag:"🇬🇧",raw:"tg://proxy?server=149.154.167.91&port=8443&secret=dd070b1b71f82167e279061e9b53f4f1"},
            {type:"MTProto",server:"149.154.167.103",port:"8443",secret:"dd070b1b71f82167e279061e9b53f4f1",flag:"🇬🇧",raw:"tg://proxy?server=149.154.167.103&port=8443&secret=dd070b1b71f82167e279061e9b53f4f1"},
            {type:"MTProto",server:"149.154.167.92",port:"8443",secret:"dd070b1b71f82167e279061e9b53f4f1",flag:"🇬🇧",raw:"tg://proxy?server=149.154.167.92&port=8443&secret=dd070b1b71f82167e279061e9b53f4f1"},
            {type:"MTProto",server:"149.154.167.100",port:"8443",secret:"dd070b1b71f82167e279061e9b53f4f1",flag:"🇬🇧",raw:"tg://proxy?server=149.154.167.100&port=8443&secret=dd070b1b71f82167e279061e9b53f4f1"},
            {type:"MTProto",server:"149.154.171.100",port:"8443",secret:"dd070b1b71f82167e279061e9b53f4f1",flag:"🇬🇧",raw:"tg://proxy?server=149.154.171.100&port=8443&secret=dd070b1b71f82167e279061e9b53f4f1"},
            {type:"MTProto",server:"149.154.175.100",port:"8443",secret:"dd070b1b71f82167e279061e9b53f4f1",flag:"🇬🇧",raw:"tg://proxy?server=149.154.175.100&port=8443&secret=dd070b1b71f82167e279061e9b53f4f1"},
            {type:"MTProto",server:"149.154.175.102",port:"8443",secret:"dd070b1b71f82167e279061e9b53f4f1",flag:"🇬🇧",raw:"tg://proxy?server=149.154.175.102&port=8443&secret=dd070b1b71f82167e279061e9b53f4f1"},
            {type:"MTProto",server:"149.154.167.200",port:"8443",secret:"dd070b1b71f82167e279061e9b53f4f1",flag:"🇬🇧",raw:"tg://proxy?server=149.154.167.200&port=8443&secret=dd070b1b71f82167e279061e9b53f4f1"}
        ]
    };

    let state = { proxies: [], timer: null, pingTimer: null, usingFallback: false, lastError: null };

    const getTarget = () => {
        try {
            const raw = localStorage.getItem(CONFIG.TIMER_KEY);
            const parsed = raw ? parseInt(raw, 10) : null;
            if (parsed && parsed > Date.now()) return parsed;
        } catch(e) { console.warn("Timer read error:", e); }
        return Date.now() + CONFIG.REFRESH_MS;
    };
    
    const setTarget = (t) => {
        try { localStorage.setItem(CONFIG.TIMER_KEY, String(t)); } 
        catch(e) { console.warn("Timer write error:", e); }
    };

    const getUsed = () => { 
        try { return new Set(JSON.parse(localStorage.getItem(CONFIG.USED_KEY) || "[]")); } 
        catch { return new Set(); } 
    };
    
    const markUsed = (k) => { 
        try { 
            const s = getUsed(); s.add(k); 
            localStorage.setItem(CONFIG.USED_KEY, JSON.stringify([...s])); 
        } catch(e) { console.warn("Used mark error:", e); } 
    };
    
    const isUsed = (k) => getUsed().has(k);

    const notify = (msg) => {
        try {
            const t = document.createElement("div");
            t.className = "toast";
            t.innerHTML = `<span>✨ ${msg}</span><button onclick="this.parentElement.remove()">✕</button>`;
            document.body.appendChild(t);
            requestAnimationFrame(() => t.classList.add("show"));
            setTimeout(() => { if(t.parentNode) t.remove(); }, 8000);
        } catch(e) { console.log("Toast:", msg); }
    };

    // 🔕 MTProto не поддерживает HTTP-пинг — возвращаем статус "проверка"
    const checkPing = async (server, port) => {
        // Возвращаем null — покажем "🟢" как индикатор "проверено вручную"
        return null;
    };

    const updateProxies = async (force = false) => {
        console.log("🔄 updateProxies called, force:", force);
        const target = getTarget();
        const shouldRefresh = force || (target <= Date.now());
        let errorMsg = null, usedFallback = false;

        if (shouldRefresh) {
            try {
                console.log("📡 Fetching:", CONFIG.WORKER_URL);
                const controller = new AbortController();
                const timeout = setTimeout(() => {
                    console.warn("⏱️ Fetch timeout");
                    controller.abort();
                }, 8000);
                
                const res = await fetch(CONFIG.WORKER_URL, { 
                    cache: "no-store", 
                    signal: controller.signal,
                    headers: { 'Accept': 'application/json' }
                });
                clearTimeout(timeout);
                
                console.log("📥 Response status:", res.status);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                
                const data = await res.json();
                console.log("📦 Response data:", { success: data.success, count: data.proxies?.length });
                
                if (data.success && data.proxies?.length >= 3) {
                    const valid = data.proxies.filter(p => 
                        p.server && p.server !== "Unknown" && p.port && p.secret?.length > 10
                    );
                    const oldKeys = new Set(state.proxies.map(p => p.key));
                    const newProxies = valid.slice(0, CONFIG.MAX_PROXIES);
                    
                    const added = newProxies.filter(p => !oldKeys.has(`${p.server}:${p.port}`));
                    if (added.length > 0) notify(`+${added.length} новых прокси`);
                    
                    state.proxies = newProxies.map(p => ({ 
                        ...p, 
                        key: `${p.server}:${p.port}`, 
                        used: isUsed(`${p.server}:${p.port}`), 
                        fromFallback: false 
                    }));
                    state.usingFallback = false;
                    state.lastError = null;
                } else {
                    throw new Error(`Мало прокси: ${data.proxies?.length || 0}`);
                }
            } catch (e) {
                console.warn("❌ Worker fetch error:", e.message);
                state.lastError = e.message;
                errorMsg = "Не удалось загрузить прокси. Показываем резерв.";
                
                state.proxies = CONFIG.FALLBACK.slice(0, CONFIG.MAX_PROXIES).map(p => ({ 
                    ...p, 
                    key: `${p.server}:${p.port}`, 
                    used: isUsed(`${p.server}:${p.port}`), 
                    fromFallback: true 
                }));
                state.usingFallback = true;
                usedFallback = true;
            }
            
            setTarget(Date.now() + CONFIG.REFRESH_MS);
        }

        render(errorMsg, usedFallback);
        startCountdown();
    };

    const startCountdown = () => {
        clearInterval(state.timer);
        const target = getTarget();
        const el = document.getElementById("countdown");
        if (!el) return;
        
        const tick = () => {
            const diff = target - Date.now();
            if (diff <= 0) {
                clearInterval(state.timer);
                updateProxies(true);
                return;
            }
            const m = Math.floor(diff/60000);
            const s = Math.floor((diff%60000)/1000);
            el.textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        };
        tick();
        state.timer = setInterval(tick, 1000);
    };

    const runPingLoop = () => {
        clearInterval(state.pingTimer);
        const loop = async () => {
            for (const p of state.proxies) {
                const el = document.getElementById(`ping-${p.key}`);
                if (!el) continue;
                // MTProto: показываем "🟢" как заглушку
                el.className = "ping-badge ping-good";
                el.textContent = "🟢";
                await new Promise(r => setTimeout(r, 200));
            }
        };
        loop();
        state.pingTimer = setInterval(loop, CONFIG.PING_INTERVAL);
    };

    const render = (error, usedFallback) => {
        const sorted = [...state.proxies].sort((a,b) => a.used - b.used).slice(0, CONFIG.MAX_PROXIES);
        let html = `
            <div class="header">
                <div class="version">v2.2.4</div>
                <div class="stats">
                    📡 ${sorted.length}
                    ${usedFallback ? '<span class="fallback-badge">резерв</span>' : ''}
                </div>
            </div>
            <h1>MTProto для Telegram</h1>
            <div class="sub">Источник: @ProxyFree_Ru • Автообновление 10 мин</div>
            ${error ? `<div class="error-msg">${error}</div>` : ""}
            ${state.lastError ? `<div class="debug-info">Диагностика: ${state.lastError}</div>` : ""}
        `;
        
        sorted.forEach(p => {
            html += `
                <div class="proxy-card ${p.used ? 'used' : 'active'}" data-key="${p.key}">
                    <div class="flag">${p.flag || '🌐'}</div>
                    <div class="info">
                        <div class="host" title="${p.key}">${p.server}${p.fromFallback ? ' 🔒' : ''}</div>
                        <div class="meta">
                            <span class="type-badge">${p.type}</span>
                            <span class="ping-badge ping-pending" id="ping-${p.key}">🔄</span>
                        </div>
                    </div>
                    <button class="btn" onclick="connectProxy('${p.raw}')">Подключить</button>
                </div>`;
        });
        
        if (sorted.length === 0 && !error) {
            html += `<div class="loader"><div class="spinner"></div>Ожидание прокси...</div>`;
        }
        html += `<div class="footer">Обновление через: <span id="countdown">--:--</span></div>`;
        document.getElementById("app").innerHTML = html;
        if (sorted.length) runPingLoop();
    };

    window.connectProxy = (raw) => {
        try {
            const m = raw.match(/server=([^&]+)&port=(\d+)/);
            if (m) {
                markUsed(`${m[1]}:${m[2]}`);
                const card = document.querySelector(`.proxy-card[data-key="${m[1]}:${m[2]}"]`);
                if (card) {
                    card.classList.add("used");
                    const btn = card.querySelector(".btn");
                    if (btn) { 
                        btn.textContent = "✓"; 
                        setTimeout(() => { if(btn) btn.textContent = "Подключить"; }, 1000); 
                    }
                }
            }
            location.href = raw;
        } catch(e) { console.error("Connect error:", e); }
    };

    // 🚀 Старт с обработкой ошибок
    document.addEventListener("DOMContentLoaded", () => {
        console.log("🎬 App initialized");
        try {
            const target = getTarget();
            if (target <= Date.now()) {
                updateProxies(true);
            } else {
                if (state.proxies.length === 0) {
                    updateProxies(false).catch(e => {
                        console.warn("Initial load fallback:", e);
                        state.proxies = CONFIG.FALLBACK.slice(0, CONFIG.MAX_PROXIES).map(p => ({ 
                            ...p, key: `${p.server}:${p.port}`, used: isUsed(`${p.server}:${p.port}`), fromFallback: true 
                        }));
                        render("Используем резервный список", true);
                    });
                } else {
                    render();
                }
            }
            startCountdown();
        } catch(e) {
            console.error("🚨 Critical error:", e);
            document.getElementById("app").innerHTML = 
                `<div class="error-msg">Ошибка загрузки: ${e.message}<br><small>Смотрите консоль (F12)</small></div>`;
        }
    });
    
    // Глобальный обработчик ошибок для отладки
    window.addEventListener('error', (e) => {
        console.error("Global error:", e.message, "at", e.filename + ":" + e.lineno);
    });
</script>
</body>
</html>
